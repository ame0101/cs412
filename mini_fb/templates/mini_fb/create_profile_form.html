{% extends "mini_fb/base.html" %}

{% block content %}
<h2>Create New Profile</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <label for="id_email_address">Email Address:</label>
    <input type="email" name="email_address" id="id_email_address" required>
    <button type="submit">Create Profile</button>
</form>
{% endblock %}
